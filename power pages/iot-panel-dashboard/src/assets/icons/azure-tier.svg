<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Mask to punch out the arch opening at the bottom of the A -->
    <mask id="archMask">
      <rect width="100" height="100" fill="white"/>
      <polygon points="21,100 44,61 65,100" fill="black"/>
    </mask>
  </defs>

  <!-- Dark blue left leg / back sheet -->
  <polygon
    points="5,98 34,5 55,5 25,98"
    fill="#1565C0"
    mask="url(#archMask)"
  />

  <!-- Lighter azure blue right fold / front sheet -->
  <polygon
    points="55,5 95,98 73,98 43,49"
    fill="#42A5F5"
    mask="url(#archMask)"
  />

  <!-- Shadow triangle where the fold crosses over the dark leg -->
  <polygon
    points="43,49 55,5 62,30"
    fill="#0D47A1"
    opacity="0.38"
    mask="url(#archMask)"
  />
</svg>

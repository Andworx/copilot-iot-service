<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgenticIoT — Interactive Architecture</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#06090f;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

    /* ── Header ── */
    header{background:#0d1117;border-bottom:1px solid #1c2128;padding:11px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    .h-logo{font-size:22px}
    .h-title h1{font-size:15px;font-weight:600;color:#f0f6fc}
    .h-title p{font-size:11px;color:#8b949e;margin-top:2px}
    .h-links{margin-left:auto;display:flex;gap:7px}
    .btn{display:inline-flex;align-items:center;gap:4px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 11px;font-size:11px;color:#c9d1d9;text-decoration:none;transition:all .15s}
    .btn:hover{background:#21262d;border-color:#58a6ff;color:#f0f6fc}

    /* ── Diagram wrapper ── */
    #dw{flex:1;padding:16px 20px;max-width:1440px;width:100%;margin:0 auto}
    svg#arch{width:100%;height:auto;display:block}

    /* ── SVG node interactions ── */
    .node-g{cursor:pointer}
    .node-bg{transition:fill .15s,stroke .15s,filter .15s}
    .node-g:hover .node-bg{fill:rgba(255,255,255,.09)!important;stroke:rgba(255,255,255,.44)!important;filter:drop-shadow(0 0 6px rgba(88,166,255,.35))}
    .node-g.sel .node-bg{fill:rgba(88,166,255,.12)!important;stroke:#58a6ff!important;filter:drop-shadow(0 0 9px rgba(88,166,255,.45))}
    .nlabel{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:11px;fill:#d0dae8;pointer-events:none}
    .nsub{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:9.5px;fill:#6a7a8a;pointer-events:none}
    .conn{stroke:rgba(180,210,255,.28);stroke-dasharray:7 5;stroke-width:1.5;fill:none}
    .conn-lbl{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:9.5px;fill:rgba(160,195,255,.5)}
    .band-lbl{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px}

    /* ── Info panel + overlay ── */
    #ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190;opacity:0;pointer-events:none;transition:opacity .25s}
    #ov.show{opacity:1;pointer-events:auto}
    #panel{position:fixed;top:0;right:-400px;width:375px;height:100vh;background:#0d1117;border-left:1px solid #21262d;z-index:200;overflow-y:auto;transition:right .28s cubic-bezier(.4,0,.2,1)}
    #panel.open{right:0}
    .ph{padding:15px 17px;border-bottom:1px solid #21262d;display:flex;align-items:flex-start;gap:11px;position:sticky;top:0;background:#0d1117;z-index:1}
    .pi{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
    .pt{font-size:14px;font-weight:600;color:#f0f6fc}
    .ps{font-size:11px;color:#8b949e;margin-top:3px}
    .pc{margin-left:auto;background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;padding:3px 7px;border-radius:4px;line-height:1}
    .pc:hover{color:#f0f6fc;background:#21262d}
    .pb{padding:16px 17px;display:flex;flex-direction:column;gap:16px}
    .ps2 h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;margin-bottom:7px}
    .ps2 p{font-size:12.5px;color:#c9d1d9;line-height:1.55}
    .dt{width:100%;border-collapse:collapse}
    .dt tr{border-bottom:1px solid #1c2128}
    .dt tr:last-child{border:none}
    .dt td{padding:6px 3px;font-size:11.5px}
    .dt td:first-child{color:#8b949e;width:115px;vertical-align:top}
    .dt td:last-child{color:#e6edf3;font-family:'SFMono-Regular',Consolas,monospace;font-size:10.5px}
    .tags{display:flex;flex-wrap:wrap;gap:5px}
    .tag{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:500}
    .tg{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(63,185,80,.25)}
    .tb{background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid rgba(88,166,255,.25)}
    .to{background:rgba(210,153,34,.15);color:#e3b341;border:1px solid rgba(227,179,65,.25)}
    .tp{background:rgba(188,140,255,.1);color:#bc8cff;border:1px solid rgba(188,140,255,.25)}

    /* ── Footer ── */
    footer{background:#0d1117;border-top:1px solid #1c2128;padding:9px 20px;text-align:center;font-size:11px;color:#8b949e}
    footer a{color:#58a6ff;text-decoration:none}
    footer a:hover{text-decoration:underline}
  </style>
</head>

<script>
const nodes = {
  'gpio-in': {
    name: 'GPIO Input',
    sub: 'Raspberry Pi — 4 Toggle Switches',
    icon: '🔘', iconBg: '#1a3a12',
    desc: 'Four physical toggle switches wired to Raspberry Pi GPIO input pins. A polling loop detects each state change and immediately publishes a JSON telemetry event to Azure IoT Hub over MQTT/TLS. Each event carries the switch number, new state, and a timestamp.',
    details: [
      ['Switch 1','GPIO 5'],['Switch 2','GPIO 6'],
      ['Switch 3','GPIO 13'],['Switch 4','GPIO 19'],
      ['Protocol','MQTT over TLS'],
      ['Trigger','State-change (edge detection)'],
      ['Payload','JSON — switch id, state, timestamp'],
    ],
    tags: [['Hardware','tg'],['GPIO','tg']],
  },
  'gpio-out': {
    name: 'GPIO Output',
    sub: 'Raspberry Pi — 4 LEDs',
    icon: '💡', iconBg: '#2a2808',
    desc: 'Four LEDs driven by GPIO output pins. LED state is determined by logic_map.json — a JSON rules file that maps input switch combinations to output LED patterns. The file is pulled automatically from the repo on each Pi boot, enabling remote rule updates without SSH access.',
    details: [
      ['LED 1 (Blue)','GPIO 18'],['LED 2 (Orange)','GPIO 24'],
      ['LED 3 (Green)','GPIO 25'],['LED 4 (Yellow)','GPIO 12'],
      ['Rules file','raspberry-pi/logic_map.json'],
      ['Update method','Auto git pull on boot'],
    ],
    tags: [['Hardware','tg'],['GPIO','tg']],
  },
  'edge': {
    name: 'Edge IoT Device',
    sub: 'Raspberry Pi',
    icon: '🍓', iconBg: '#2a0808',
    desc: 'Raspberry Pi running the AgenticIoT service. It continuously polls GPIO switch states, evaluates logic_map.json to set LED outputs, and publishes telemetry to Azure IoT Hub. A systemd service ensures automatic start on boot and pulls the latest repo changes on each boot cycle.',
    details: [
      ['Hardware','Raspberry Pi (any GPIO-capable model)'],
      ['OS','Raspberry Pi OS'],
      ['Service','systemd (auto-start on boot)'],
      ['Connection','MQTT over TLS → Azure IoT Hub'],
      ['Auto-update','git pull on every boot'],
      ['Bootstrap','raspberry-pi/bootstrap.sh'],
    ],
    tags: [['Hardware','tg'],['IoT Device','to'],['MQTT','tb']],
  },
  'iothub': {
    name: 'Cloud Messaging',
    sub: 'Azure IoT Hub',
    icon: '📡', iconBg: '#00306a',
    desc: 'Azure IoT Hub is the cloud gateway for device-to-cloud messaging. It authenticates and registers the Raspberry Pi as a managed IoT device, receives incoming MQTT telemetry messages over TLS, and routes them downstream to Azure Event Hub for processing.',
    details: [
      ['Tier','Standard S1'],
      ['Protocols','MQTT, AMQP, HTTPS'],
      ['Device auth','SAS token / X.509 certificate'],
      ['Routing','Message route → Event Hub'],
      ['Retention','1 day (default)'],
    ],
    tags: [['Azure','tb'],['IoT Hub','tb'],['MQTT','tb']],
  },
  'func': {
    name: 'Event Processing',
    sub: 'Azure Event Hub + Functions',
    icon: '⚡', iconBg: '#2e1a00',
    desc: 'Azure Event Hub buffers incoming telemetry from IoT Hub, decoupling ingestion from processing and enabling message replay. An Azure Function (Node.js 24) triggers on each Event Hub message — it writes the telemetry record to Dataverse and broadcasts the updated panel state to all connected browsers via Azure SignalR.',
    details: [
      ['Event Hub namespace','iot-agent-eventhub'],
      ['Function runtime','Node.js 24'],
      ['Trigger','Event Hub trigger (batch)'],
      ['Output 1','Dataverse — write telemetry row'],
      ['Output 2','SignalR — broadcast to all clients'],
      ['Source','azure infrastructure/azure-functions/'],
    ],
    tags: [['Azure','tb'],['Functions','to'],['Event Hub','tb']],
  },
  'signalr': {
    name: 'Real-time Push',
    sub: 'Azure SignalR Service',
    icon: '🔄', iconBg: '#003838',
    desc: 'Azure SignalR Service in Serverless mode maintains persistent WebSocket connections to all active browser clients on the Power Pages portal. When the Azure Function broadcasts a state update, SignalR pushes it to every connected session simultaneously — delivering a sub-second real-time dashboard experience.',

let cur = null;

function openPanel(id) {
  const n = nodes[id];
  if (!n) return;
  if (cur) {
    const prev = document.getElementById('n-' + cur);
    if (prev) prev.classList.remove('sel');
  }
  cur = id;
  const el = document.getElementById('n-' + id);
  if (el) el.classList.add('sel');

  document.getElementById('p-icon').style.background = n.iconBg;
  document.getElementById('p-icon').textContent = n.icon;
  document.getElementById('p-title').textContent = n.name;
  document.getElementById('p-sub').textContent = n.sub;

  document.getElementById('p-body').innerHTML = `
    <div class="ps2">
      <h3>About</h3>
      <p>${n.desc}</p>
    </div>
    ${n.details.length ? `
    <div class="ps2">
      <h3>Technical Details</h3>
      <table class="dt">
        ${n.details.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </table>
    </div>` : ''}
    <div class="ps2">
      <h3>Labels</h3>
      <div class="tags">
        ${n.tags.map(([t,c]) => `<span class="tag ${c}">${t}</span>`).join('')}
      </div>
    </div>
  `;

  document.getElementById('panel').classList.add('open');
  document.getElementById('ov').classList.add('show');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('ov').classList.remove('show');
  if (cur) {
    const el = document.getElementById('n-' + cur);
    if (el) el.classList.remove('sel');
    cur = null;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

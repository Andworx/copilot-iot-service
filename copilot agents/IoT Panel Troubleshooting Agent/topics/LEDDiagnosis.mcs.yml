mcs.metadata:
  componentName: LED Diagnosis
  description: Diagnoses a non-working LED on the IoT panel by checking logic map switch combinations and hardware/software causes
kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: whichLED
    description: "Which LED is having an issue? For example: LED0, LED1, LED2, LED3, or all LEDs"
    entity: StringPrebuiltEntity
    shouldPromptUser: true
modelDescription: Diagnoses a non-working LED on the Raspberry Pi IoT panel using the logic map switch combination rules from the knowledge document
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: LED Diagnosis
    triggerQueries:
      - why is the LED not on
      - LED not working
      - LED is off
      - light not turning on
      - why isn't the light on
      - LED problem
      - LED issue
  actions:
    - kind: SendActivity
      id: sendMessage_xK7mN2
      activity:
        text:
          - "I'll help you diagnose {Topic.whichLED}. Let me check the logic map for the expected switch combination and walk you through both hardware and software diagnosis steps."
inputType:
  properties:
    whichLED:
      displayName: whichLED
      description: "Which LED is having an issue? (LED0, LED1, LED2, LED3, or all LEDs)"
      type: String

mcs.metadata:
  componentName: Azure Pipeline Troubleshooting
  description: Walks through Azure data pipeline stages to identify where telemetry data is not flowing through to the dashboard
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Azure Pipeline Troubleshooting
    triggerQueries:
      - dashboard not updating
      - no data on dashboard
      - telemetry not showing
      - Azure not receiving
      - data not coming through
      - pipeline broken
      - not getting updates
  actions:
    - kind: SendActivity
      id: sendMessage_nF3vD6
      activity:
        text:
          - "Let's isolate where the pipeline is breaking. The full chain is: Raspberry Pi → IoT Hub → Event Hub → Logic App → Function App → SignalR → Browser dashboard.\n\nWork through these checks in order:\n\n1. Pi service running? Run: sudo systemctl status iot-monitor\n2. Local API responding? Run: curl http://localhost:8080/api/status\n3. IoT Hub: check device raspberry-pi-iotpanel is Connected in iothub-aw-iot-copilot (Azure portal)\n4. Function App healthy? GET https://func-aw-iot-copilot.azurewebsites.net/api/health\n5. Browser: open the browser console and check for SignalR connection errors\n\nWhich step is showing a problem?"

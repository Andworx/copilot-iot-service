mcs.metadata:
  componentName: Panel Health Check
  description: Walks the user through a quick smoke test to confirm the IoT panel is working correctly end-to-end
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Panel Health Check
    triggerQueries:
      - is the panel working
      - check panel status
      - panel health
      - is everything working
      - run diagnostics
      - check everything
  actions:
    - kind: SendActivity
      id: sendMessage_bJ9wQ5
      activity:
        text:
          - "Let's run the panel smoke test. Follow these steps:\n\n1. Flip SW1 (military-style red toggle switch) to ON and turn SW3 (keyed switch — insert and turn the key) simultaneously\n2. All 4 LEDs (LED0, LED1, LED2, LED3) should light up — this is the all_lights_on healthy state\n3. Return SW1 to OFF and return SW3's key to the off position, then confirm the LEDs turn off\n4. Check the dashboard is showing live telemetry\n\nIf all 4 LEDs lit up in step 2, the panel hardware and logic map are healthy. If any LED failed, that is our starting point for diagnosis. Which step are you seeing a problem on?"

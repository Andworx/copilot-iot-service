name: Project Label Sync

on:
  pull_request_target:
    types: [opened, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync-project-label:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure dependencies label exists for Dependabot PRs
        if: github.actor == 'dependabot[bot]'
        run: |
          TARGET_REPO="${{ github.event.pull_request.base.repo.full_name }}"
          LABEL_EXISTS=$(gh label list --repo "$TARGET_REPO" --limit 200 --json name --jq '.[] | select(.name == "dependencies") | .name')
          if [ -z "$LABEL_EXISTS" ]; then
            gh label create "dependencies" --repo "$TARGET_REPO" --color "0366d6" --description "Pull requests that update a dependency"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Add dependencies label to Dependabot PRs
        if: github.actor == 'dependabot[bot]'
        run: |
          TARGET_REPO="${{ github.event.pull_request.base.repo.full_name }}"
          gh pr edit ${{ github.event.pull_request.number }} --repo "$TARGET_REPO" --add-label "dependencies"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Get linked issue from PR body
        id: get-issue
        run: |
          # Extract issue number from PR body (e.g., "Fixes #123")
          ISSUE_NUMBER=$(echo "${{ github.event.pull_request.body }}" | grep -oP '(?i)(Fixes|Closes|Resolves)\s+#\K[0-9]+' | head -1)
          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Check if issue has project label
        if: steps.get-issue.outputs.issue_number != ''
        id: check-label
        run: |
          TARGET_REPO="${{ github.event.pull_request.base.repo.full_name }}"
          LABELS=$(gh issue view ${{ steps.get-issue.outputs.issue_number }} --repo "$TARGET_REPO" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "YOUR_PROJECT_LABEL"; then
            echo "has_label=true" >> $GITHUB_OUTPUT
          else
            echo "has_label=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Add project label to issue if missing
        if: steps.get-issue.outputs.issue_number != '' && steps.check-label.outputs.has_label == 'false'
        run: |
          TARGET_REPO="${{ github.event.pull_request.base.repo.full_name }}"
          gh issue edit ${{ steps.get-issue.outputs.issue_number }} --repo "$TARGET_REPO" --add-label "YOUR_PROJECT_LABEL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
